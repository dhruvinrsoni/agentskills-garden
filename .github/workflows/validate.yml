name: Validate Skills Garden

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate registry & skill frontmatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run skill validator (strict / frontmatter-driven)
        run: python scripts/validate.py --strict

      - name: Check internal markdown links
        run: python scripts/check-links.py
