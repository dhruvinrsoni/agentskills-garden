# --------------------------------------------------------------------------
# Pragmatism Layer (25) — Aparigraha (non-accumulation)
# Fires before implementation. Direction-of-thought, not rigid rule.
# --------------------------------------------------------------------------
pragmatism:
  - name: reuse-first
    path: skills/25-pragmatism/reuse-first/SKILL.md
    description: Before writing any new utility, scan the codebase and declared dependencies for an equivalent. Reuse only after fit and edge-case validation.
    tags: [category, build, pragmatism, advisory]
    reasoning_mode: plan-execute

  - name: dependency-utility-scout
    path: skills/25-pragmatism/dependency-utility-scout/SKILL.md
    description: Mine the project's declared dependencies and produce a per-capability inventory of utilities the team already imports — advisory, never auto-rewrites.
    tags: [category, build, pragmatism, advisory]
    reasoning_mode: plan-execute

  - name: style-conformance
    path: skills/25-pragmatism/style-conformance/SKILL.md
    description: Detect the project's existing conventions (naming, formatting, errors, logging, tests) and produce a house-style profile downstream skills consult — awareness, not enforcement.
    tags: [category, build, pragmatism, advisory]
    reasoning_mode: plan-execute

  - name: minimal-diff
    path: skills/25-pragmatism/minimal-diff/SKILL.md
    description: Smallest correct change that solves the problem. No drive-by formatting or opportunistic refactors; diff-size caps, reversibility checks, and commit splitting when concerns are tangled.
    tags: [category, build, pragmatism, advisory]
    reasoning_mode: plan-execute

  - name: chesterton-fence
    path: skills/25-pragmatism/chesterton-fence/SKILL.md
    description: Before deleting or refactoring code that looks unused or weird, reconstruct why it exists from history, tests, comments, and call-graph; produce a memo plus an edge-case checklist that gates the change.
    tags: [category, build, pragmatism, advisory]
    reasoning_mode: plan-execute

  - name: brownfield-onboarding
    path: skills/25-pragmatism/brownfield-onboarding/SKILL.md
    description: First-touch protocol for a new project — read README/AGENTS.md/ADRs, find build/test/CI commands, hot zones, entry points, and test layout; emit an onboarding cheat-sheet other Aparigraha skills consume.
    tags: [category, discovery, pragmatism, advisory]
    reasoning_mode: plan-execute

  - name: aparigraha-task
    path: skills/25-pragmatism/aparigraha-task/SKILL.md
    description: Master workflow walking the Aparigraha gates end-to-end — onboarding, dependency inventory, style detection, reuse-first authoring, surgical diff, audit. Orchestrates the 25-pragmatism category skills. No implementation logic.
    tags: [master, build, pragmatism, advisory]
    reasoning_mode: plan-execute

