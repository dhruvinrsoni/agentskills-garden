<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ===== Document basics ===== -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}{{ site.name }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ site.tagline }}{% endblock %}">
  <meta name="keywords" content="agent skills, AI agents, skill library, constitution, Satya, Dharma, Ahimsa, Pragya, Sanskrit, foundation skills">
  <meta name="author" content="Dhruvin Soni">

  <!-- ===== SEO / indexing ===== -->
  <meta name="robots" content="index, follow, max-image-preview:large">
  <link rel="canonical" href="{% block canonical %}{{ site.canonical_root }}{{ page_url }}{% endblock %}">

  <!-- ===== Color scheme & theme color ===== -->
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#0a84ff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">

  <!-- ===== Open Graph (Facebook, LinkedIn, Slack, Discord) ===== -->
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ self.meta_description() }}{% endblock %}">
  <meta property="og:url" content="{{ site.canonical_root }}{{ page_url }}">
  <meta property="og:site_name" content="{{ site.name }}">
  <meta property="og:locale" content="en_US">
  <!-- TODO: replace with a real 1200x630 PNG once you create one. -->
  <meta property="og:image" content="{{ site.canonical_root }}/og-image.png">
  <meta property="og:image:alt" content="{{ site.name }} — {{ site.tagline }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- ===== Twitter Cards (X / Twitter) ===== -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@dhruvinrsoni">
  <meta name="twitter:creator" content="@dhruvinrsoni">
  <meta name="twitter:title" content="{{ self.og_title() }}">
  <meta name="twitter:description" content="{{ self.og_description() }}">
  <meta name="twitter:image" content="{{ site.canonical_root }}/og-image.png">
  <meta name="twitter:image:alt" content="{{ site.name }} — {{ site.tagline }}">

  <!-- ===== iOS / Apple Web App ===== -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Skills Garden">
  <meta name="format-detection" content="telephone=no">
  <!-- TODO: replace with real 180x180 PNG once available -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ base_url }}/apple-touch-icon.png">

  <!-- ===== Windows / Microsoft Tile ===== -->
  <meta name="msapplication-TileColor" content="#0a84ff">
  <meta name="msapplication-config" content="none">

  <!-- ===== Web App Manifest (PWA) ===== -->
  <link rel="manifest" href="{{ base_url }}/manifest.webmanifest">

  <!-- ===== Search engine verification (commented placeholders) ===== -->
  <!-- <meta name="google-site-verification" content="YOUR_CODE_HERE"> -->
  <!-- <meta name="msvalidate.01" content="YOUR_BING_CODE_HERE"> -->

  <!-- ===== Schema.org structured data (JSON-LD) ===== -->
  {% block jsonld %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "{{ site.canonical_root }}/#website",
        "url": "{{ site.canonical_root }}/",
        "name": "{{ site.name }}",
        "description": "{{ site.tagline }}",
        "inLanguage": "en-US"
      },
      {
        "@type": "SoftwareSourceCode",
        "@id": "{{ site.canonical_root }}/#repo",
        "name": "{{ site.name }}",
        "description": "{{ site.tagline }}",
        "codeRepository": "{{ site.github_url }}",
        "programmingLanguage": ["YAML", "Markdown", "PowerShell"],
        "license": "https://opensource.org/licenses/Apache-2.0",
        "author": {
          "@type": "Person",
          "name": "Dhruvin Soni",
          "url": "https://dhruvinrsoni.github.io/dhruvinrsoni/"
        }
      }
    ]
  }
  </script>
  {% endblock %}

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ base_url }}/assets/style.css">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.dataset.theme = saved;
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="{{ base_url }}/">
        <span class="brand-mark" aria-hidden="true">&#127793;</span>
        <span class="brand-name">{{ site.name }}</span>
      </a>
      <nav class="primary-nav" aria-label="Primary">
        <a href="{{ base_url }}/#skills">Skills</a>
        <a href="{{ base_url }}/concepts/">Concepts</a>
        <a href="{{ base_url }}/tags/">Tags</a>
        <a href="{{ site.github_url }}" rel="noopener">GitHub</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Toggle color theme" data-theme-toggle>
        <span class="theme-icon-light" aria-hidden="true">&#9728;</span>
        <span class="theme-icon-dark" aria-hidden="true">&#9790;</span>
      </button>
    </div>
  </header>

  <main id="main" class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <p>
        <a href="{{ site.github_url }}" rel="noopener">{{ site.repo_name }}</a>
        &middot; Apache-2.0
        &middot; {{ site.skill_count }} skills, {{ site.category_count }} categories
      </p>
      <p class="muted">
        Generated {{ site.generated_at }} from
        <a href="{{ site.github_url }}/blob/main/registry.yaml" rel="noopener">registry.yaml</a>
      </p>
    </div>
  </footer>

  <script src="{{ base_url }}/assets/filter.js" defer></script>
</body>
</html>
